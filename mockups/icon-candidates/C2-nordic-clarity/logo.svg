<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" role="img" aria-label="Year Planner — Nordic Clarity logo">
  <title>Year Planner — Nordic Clarity</title>

  <!--
    C2 · NORDIC CLARITY · Horizontal lockup
    Dark-header mini icon left · bold all-caps wordmark right
    The dark left side creates an immediately distinctive silhouette vs C1/C3
  -->

  <!-- Near-white background -->
  <rect width="480" height="120" rx="16" fill="#F8F9FB"/>

  <!-- ── Mini icon (left, 96×96 at x=12, y=12) ── -->
  <rect x="12" y="12" width="96" height="96" rx="14" fill="#F8F9FB"/>
  <!-- Dark header -->
  <rect x="12" y="12" width="96" height="36" rx="14" fill="#1A1D23"/>
  <rect x="12" y="32" width="96" height="16" fill="#1A1D23"/>
  <!-- Header weekday dots -->
  <circle cx="24" cy="42" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="38" cy="42" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="52" cy="42" r="3" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="66" cy="42" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="80" cy="42" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="94" cy="42" r="3" fill="#FFFFFF" opacity="0.3"/>
  <!-- Blue accent line -->
  <rect x="12" y="47" width="96" height="1.5" fill="#2563EB"/>
  <!-- Mini grid (5 cols × 3 rows) -->
  <rect x="14" y="52" width="17" height="14" rx="2" fill="#FFFFFF" stroke="#E8EAF0" stroke-width="1"/>
  <rect x="33" y="52" width="17" height="14" rx="2" fill="#2563EB"/>
  <rect x="52" y="52" width="17" height="14" rx="2" fill="#FFFFFF" stroke="#E8EAF0" stroke-width="1"/>
  <rect x="71" y="52" width="17" height="14" rx="2" fill="#F3F4F8" stroke="#E8EAF0" stroke-width="1"/>
  <rect x="90" y="52" width="16" height="14" rx="2" fill="#F3F4F8" stroke="#E8EAF0" stroke-width="1"/>

  <rect x="14" y="69" width="17" height="14" rx="2" fill="#FFFFFF" stroke="#E8EAF0" stroke-width="1"/>
  <rect x="33" y="69" width="17" height="14" rx="2" fill="#FFE0E0" stroke="#E8EAF0" stroke-width="1"/>
  <rect x="52" y="69" width="17" height="14" rx="2" fill="#FFFFFF" stroke="#E8EAF0" stroke-width="1"/>
  <rect x="71" y="69" width="17" height="14" rx="2" fill="#F3F4F8" stroke="#E8EAF0" stroke-width="1"/>
  <rect x="90" y="69" width="16" height="14" rx="2" fill="#F3F4F8" stroke="#E8EAF0" stroke-width="1"/>

  <rect x="14" y="86" width="17" height="14" rx="2" fill="#FFFFFF" stroke="#E8EAF0" stroke-width="1"/>
  <rect x="33" y="86" width="17" height="14" rx="2" fill="#FFFFFF" stroke="#E8EAF0" stroke-width="1"/>
  <rect x="52" y="86" width="17" height="14" rx="2" fill="#D5E5FF" stroke="#E8EAF0" stroke-width="1"/>
  <rect x="71" y="86" width="17" height="14" rx="2" fill="#F3F4F8" stroke="#E8EAF0" stroke-width="1"/>
  <rect x="90" y="86" width="16" height="14" rx="2" fill="#F3F4F8" stroke="#E8EAF0" stroke-width="1"/>

  <!-- ── Divider: electric blue vertical bar ── -->
  <rect x="118" y="16" width="3" height="88" rx="1.5" fill="#2563EB"/>

  <!-- ── Wordmark ── -->
  <!-- "YEAR" — bold, all-caps, dark, large -->
  <text
    x="132" y="62"
    font-family="'DM Sans', -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="40"
    font-weight="700"
    fill="#1A1D23"
    letter-spacing="-1"
    dominant-baseline="auto"
  >YEAR</text>

  <!-- "PLANNER" — lighter weight, blue accent -->
  <text
    x="134" y="92"
    font-family="'DM Sans', -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="400"
    fill="#2563EB"
    letter-spacing="5"
    dominant-baseline="auto"
  >PLANNER</text>
</svg>
