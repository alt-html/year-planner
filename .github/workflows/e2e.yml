# CDN assets are served from .tests/fixtures/ via page.route() — no live CDN access needed.
name: E2E Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: .tests
        run: npm ci

      - name: Install Chromium browser and OS dependencies
        working-directory: .tests
        run: npx playwright install --with-deps chromium

      - name: Run M013 verification (legacy gates + smoke + e2e)
        run: bash scripts/verify-m013-cleanup.sh

      - name: Upload M013 verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m013-cleanup-report
          path: .tests/test-results/m013-cleanup/M013-cleanup-report.json
          if-no-files-found: warn
