        <div class="modal fade" id="entryModal" tabindex="-1" role="dialog" aria-labelledby="entryModalLabel" v-bind:aria-hidden="!showEntryModal"
             v-bind:class="{ show: showEntryModal, 'd-block': showEntryModal }">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content yp-entry-modal">
                    <div class="yp-entry-date">
                        <span id="entryModalLabel">{{$t('month.'+monthsOfYear[month])+' '+day}}</span>
                        <button type="button" class="yp-entry-close" v-on:click="closeEntryModal()" aria-label="Close"><i class="ph ph-x"></i></button>
                    </div>
                    <input type="text" v-model="entry" id="yp-entry-textarea" maxlength="32" class="yp-entry-text" v-bind:class="'yp-cell-c'+getEntryColour(month,day)" v-bind:placeholder="$t('label.taglineplaceholder')">
                    <label class="yp-entry-field-label" for="yp-notes-textarea">{{$t('label.notesplaceholder')}}</label>
                    <textarea v-model="entryNotes" id="yp-notes-textarea" class="yp-entry-notes" rows="3" v-bind:placeholder="$t('label.notesplaceholder')"></textarea>
                    <div class="yp-entry-tools">
                        <div class="yp-colour-dots">
                            <button type="button" class="yp-dot yp-dot-clear" v-on:click="updateEntry(month,day,entry,entryType,0,entryNotes,entryEmoji,true)" title="Clear"></button>
                            <button type="button" class="yp-dot yp-dot-c1" v-on:click="updateEntry(month,day,entry,entryType,1,entryNotes,entryEmoji,true)"></button>
                            <button type="button" class="yp-dot yp-dot-c2" v-on:click="updateEntry(month,day,entry,entryType,2,entryNotes,entryEmoji,true)"></button>
                            <button type="button" class="yp-dot yp-dot-c3" v-on:click="updateEntry(month,day,entry,entryType,3,entryNotes,entryEmoji,true)"></button>
                            <button type="button" class="yp-dot yp-dot-c4" v-on:click="updateEntry(month,day,entry,entryType,4,entryNotes,entryEmoji,true)"></button>
                            <button type="button" class="yp-dot yp-dot-c5" v-on:click="updateEntry(month,day,entry,entryType,5,entryNotes,entryEmoji,true)"></button>
                            <button type="button" class="yp-dot yp-dot-c6" v-on:click="updateEntry(month,day,entry,entryType,6,entryNotes,entryEmoji,true)"></button>
                            <button type="button" class="yp-dot yp-dot-c7" v-on:click="updateEntry(month,day,entry,entryType,7,entryNotes,entryEmoji,true)"></button>
                            <button type="button" class="yp-dot yp-dot-c8" v-on:click="updateEntry(month,day,entry,entryType,8,entryNotes,entryEmoji,true)"></button>
                        </div>
                        <div class="yp-entry-actions">
                            <button type="button" class="yp-action-dismiss" v-on:click="closeEntryModal()">{{$t('label.close')}}</button>
                            <button type="button" class="yp-action-save" v-on:click="updateEntry(month,day,entry,entryType,entryColour,entryNotes,entryEmoji,true); closeEntryModal()">{{$t('label.update')}}</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-backdrop fade show" v-if="showEntryModal" v-on:click="closeEntryModal()"></div>
