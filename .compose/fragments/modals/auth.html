        <div class="modal fade" id="authModal" tabindex="-1" role="dialog" aria-labelledby="authModalLabel" v-bind:aria-hidden="!showAuthModal"
             v-bind:class="{ show: showAuthModal, 'd-block': showAuthModal }">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="authModalLabel">{{authLinkMode ? $t('label.addAccount') : $t('label.signin')}}</h5>
                        <button type="button" class="btn-close" v-on:click="closeAuthModal()" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div v-if="modalError" class="alert alert-danger alert-dismissible yp-error-alert" role="alert" aria-live="polite" aria-atomic="true">
                            <div class="yp-error-icon" aria-hidden="true"><i class="ph ph-warning-circle"></i></div>
                            <div class="yp-error-copy">
                                <p class="mb-0">{{$t(modalError)}}</p>
                            </div>
                            <button type="button" class="btn-close" v-on:click="clearModalAlert" aria-label="Close"></button>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-outline-dark mb-2"
                                    v-if="availableProviders.includes('google') && !(authLinkMode && linkedProviders.includes('google'))"
                                    v-on:click="signInWith('google')">
                                <i class="ph ph-google-logo me-2"></i> {{authLinkMode ? $t('label.link') : 'Sign in'}} with Google
                            </button>
                            <button type="button" class="btn btn-outline-dark mb-2"
                                    v-if="availableProviders.includes('github') && !(authLinkMode && linkedProviders.includes('github'))"
                                    v-on:click="signInWith('github')">
                                <i class="ph ph-github-logo me-2"></i> {{authLinkMode ? $t('label.link') : 'Sign in'}} with GitHub
                            </button>
                            <button type="button" class="btn btn-outline-dark mb-2"
                                    v-if="availableProviders.includes('apple') && !(authLinkMode && linkedProviders.includes('apple'))"
                                    v-on:click="signInWith('apple')">
                                <i class="ph ph-apple-logo me-2"></i> {{authLinkMode ? $t('label.link') : 'Sign in'}} with Apple
                            </button>
                            <button type="button" class="btn btn-outline-dark mb-2"
                                    v-if="availableProviders.includes('microsoft') && !(authLinkMode && linkedProviders.includes('microsoft'))"
                                    v-on:click="signInWith('microsoft')">
                                <i class="ph ph-microsoft-outlook-logo me-2"></i> {{authLinkMode ? $t('label.link') : 'Sign in'}} with Microsoft
                            </button>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" v-on:click="closeAuthModal()">{{$t('label.close')}}</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-backdrop fade show" v-if="showAuthModal" v-on:click="closeAuthModal()"></div>
