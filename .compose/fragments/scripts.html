    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>

    <script  type="module" src="./js/main.js"></script>

    <!-- Rail toggle, style-theme switching, dark-mode early-apply, calendar flyout -->
    <script>
    (function() {
        var body = document.body;
        var rail = document.getElementById('rail');
        var railToggle = document.getElementById('railToggle');
        var darkToggle = document.getElementById('darkToggle');
        var railDarkToggle = document.getElementById('railDarkToggle');
        var themeLabel = document.getElementById('themeLabel');
        var iconRuler = document.getElementById('themeSwitchIconRuler');
        var iconFeather = document.getElementById('themeSwitchIconFeather');
        var calendarFlyout = document.getElementById('railCalendarFlyout');
        var railCalendarBtn = document.getElementById('railCalendarBtn');
        var railYearInput = document.getElementById('railYearInput');

        // ---- Style theme (ink / nordic) on <body> ----
        var savedStyleTheme = localStorage.getItem('style_theme') || 'ink';
        body.setAttribute('data-theme', savedStyleTheme);
        applyThemeLabel(savedStyleTheme);

        function applyThemeLabel(theme) {
            var isNordic = theme === 'nordic';
            var label = isNordic ? 'Crisp &amp; Clear' : 'Ink &amp; Paper';
            if (themeLabel) themeLabel.innerHTML = label;
            var navLabel = document.getElementById('navThemeLabel');
            if (navLabel) navLabel.innerHTML = label;
            if (iconRuler)  iconRuler.style.display  = isNordic ? 'none'   : 'inline';
            if (iconFeather) iconFeather.style.display = isNordic ? 'inline' : 'none';
        }

        // ---- Dark mode early-apply from URL ----
        var params = new URLSearchParams(window.location.search);
        if (params.get('theme') === 'dark') {
            body.classList.add('yp-dark');
        }

        // ---- Restore rail state from sessionStorage ----
        if (sessionStorage.getItem('rail_open') === '1') {
            rail.classList.add('open');
            body.classList.add('rail-open');
            sessionStorage.removeItem('rail_open');
        }

        // ---- Rail toggle ----
        if (railToggle) {
            railToggle.addEventListener('click', function() {
                closeFlyout();
                rail.classList.toggle('open');
                body.classList.toggle('rail-open');
            });
        }

        // Close rail when clicking outside (but NOT for dark/theme toggles in the rail)
        document.addEventListener('click', function(e) {
            // Close flyout if clicking outside it and outside the calendar button
            if (calendarFlyout && calendarFlyout.classList.contains('open') &&
                !calendarFlyout.contains(e.target) &&
                e.target !== railCalendarBtn &&
                !railCalendarBtn.contains(e.target)) {
                closeFlyout();
            }

            if (rail && rail.classList.contains('open') &&
                !rail.contains(e.target) &&
                e.target !== railToggle &&
                !railToggle.contains(e.target) &&
                !(calendarFlyout && calendarFlyout.contains(e.target)) &&
                !(markerFlyout && markerFlyout.contains(e.target)) &&
                !(emojiFlyout && emojiFlyout.contains(e.target)) &&
                !markerActive && !emojiActive) {
                rail.classList.remove('open');
                body.classList.remove('rail-open');
                closeFlyout();
            }
        });

        // ---- Dark mode toggle ----
        function doDarkToggle() {
            // Persist rail state across reload
            if (rail && rail.classList.contains('open')) {
                sessionStorage.setItem('rail_open', '1');
            }
            var p = new URLSearchParams(window.location.search);
            var current = p.get('theme') || 'light';
            var next = current === 'dark' ? 'light' : 'dark';
            p.set('theme', next);
            window.location.search = p.toString();
        }
        if (darkToggle)     darkToggle.addEventListener('click', doDarkToggle);
        if (railDarkToggle) railDarkToggle.addEventListener('click', doDarkToggle);

        // ---- Style-theme toggle ----
        var themeToggleBtn = document.getElementById('themeToggleBtn');
        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', function() {
                var current = body.getAttribute('data-theme');
                var next = current === 'ink' ? 'nordic' : 'ink';
                body.setAttribute('data-theme', next);
                localStorage.setItem('style_theme', next);
                applyThemeLabel(next);
            });
        }

        // ---- Calendar flyout ----
        function closeFlyout() {
            if (calendarFlyout) calendarFlyout.classList.remove('open');
            if (railCalendarBtn) railCalendarBtn.classList.remove('flyout-active');
        }

        if (railCalendarBtn) {
            railCalendarBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isOpen = calendarFlyout.classList.contains('open');
                if (isOpen) {
                    closeFlyout();
                } else {
                    calendarFlyout.classList.add('open');
                    railCalendarBtn.classList.add('flyout-active');
                }
            });
        }

        // Close flyout when a month/today link is clicked (it scrolls to that anchor)
        if (calendarFlyout) {
            calendarFlyout.querySelectorAll('a.rail-flyout-item').forEach(function(link) {
                link.addEventListener('click', function() {
                    closeFlyout();
                    rail.classList.remove('open');
                    body.classList.remove('rail-open');
                });
            });
        }

        // Year input in flyout — navigate on Enter
        if (railYearInput) {
            railYearInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    var yr = parseInt(railYearInput.value);
                    if (!isNaN(yr) && yr > 0 && yr < 10000) {
                        var p = new URLSearchParams(window.location.search);
                        p.set('year', yr);
                        window.location.search = p.toString();
                    }
                }
            });
        }

        // ---- Marker / highlighter mode ----
        var railMarkerBtn = document.getElementById('railMarkerBtn');
        var markerFlyout  = document.getElementById('railMarkerFlyout');
        var markerActive  = false;
        var markerColour  = 1;          // default colour index
        var markerDragging = false;
        var markerLastCell = null;       // prevent duplicate updates on same cell

        function openMarkerFlyout() {
            closeFlyout();  // close calendar flyout if open
            markerFlyout.classList.add('open');
            railMarkerBtn.classList.add('flyout-active');
        }
        function closeMarkerFlyout() {
            if (markerFlyout) markerFlyout.classList.remove('open');
            if (railMarkerBtn) railMarkerBtn.classList.remove('flyout-active');
        }
        function activateMarkerMode() {
            if (typeof deactivateEmojiMode === 'function' && emojiActive) deactivateEmojiMode();
            markerActive = true;
            body.classList.add('marker-mode');
            railMarkerBtn.classList.add('active');
            openMarkerFlyout();
        }
        function deactivateMarkerMode() {
            markerActive = false;
            body.classList.remove('marker-mode');
            body.classList.remove('marker-dragging');
            railMarkerBtn.classList.remove('active');
            closeMarkerFlyout();
            markerDragging = false;
            markerLastCell = null;
        }

        if (railMarkerBtn) {
            railMarkerBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (markerActive) {
                    deactivateMarkerMode();
                } else {
                    activateMarkerMode();
                }
            });
        }

        // Colour dot selection in marker flyout
        if (markerFlyout) {
            markerFlyout.querySelectorAll('.marker-dot').forEach(function(dot) {
                dot.addEventListener('click', function(e) {
                    e.stopPropagation();
                    markerColour = parseInt(dot.getAttribute('data-colour'));
                    // Update selected state
                    markerFlyout.querySelectorAll('.marker-dot').forEach(function(d) {
                        d.classList.remove('selected');
                    });
                    dot.classList.add('selected');
                });
            });
            // Set default selection
            var defaultDot = markerFlyout.querySelector('[data-colour="1"]');
            if (defaultDot) defaultDot.classList.add('selected');
        }

        // Apply colour to a single grid cell via the Vue app
        function applyMarkerToCell(cellEl) {
            if (cellEl === markerLastCell) return; // already painted this cell
            markerLastCell = cellEl;

            // Find the Vue app instance (Vue 3: vnode on container element)
            var appEl = document.getElementById('app');
            if (!appEl || !appEl._vnode || !appEl._vnode.component) return;
            var vueInstance = appEl._vnode.component.proxy;
            if (!vueInstance) return;

            // Parse the cell's month and day from its rendered content and position
            // The cell is inside a month column — find which month
            var monthCol = cellEl.closest('[class*="col"]');
            if (!monthCol) return;
            var monthsRow = monthCol.parentElement;
            if (!monthsRow) return;
            var cols = monthsRow.querySelectorAll(':scope > [class*="col"]');
            var mindex = -1;
            for (var ci = 0; ci < cols.length; ci++) {
                if (cols[ci] === monthCol) { mindex = ci; break; }
            }
            if (mindex < 0) return;

            // Find the day number from the cell text
            var daySpan = cellEl.querySelector('.yp-cell-text');
            if (!daySpan) return;
            var dayText = daySpan.textContent.trim().replace(/\u00a0/g, '');
            var day = parseInt(dayText);
            if (isNaN(day) || day < 1) return;

            // Use the same updateEntry path as the modal
            var entry = vueInstance.getEntry(mindex, day);
            var entryType = vueInstance.getEntryType(mindex, day);
            var notes = vueInstance.getEntryNotes(mindex, day);
            var emoji = vueInstance.getEntryEmoji(mindex, day);
            vueInstance.updateEntry(mindex, day, entry, entryType, markerColour, notes, emoji, true);
        }

        // Intercept grid cell interactions in marker mode
        document.addEventListener('mousedown', function(e) {
            if (!markerActive) return;

            // Find the nearest .yp-cell ancestor within #yp-months
            var cell = e.target.closest('#yp-months .yp-cell');
            if (!cell) return;

            // Prevent modal from opening
            e.preventDefault();
            e.stopPropagation();

            markerDragging = true;
            markerLastCell = null;
            body.classList.add('marker-dragging');
            applyMarkerToCell(cell);
        }, true);  // capture phase to intercept before Bootstrap modal

        document.addEventListener('mousemove', function(e) {
            if (!markerDragging) return;
            var cell = document.elementFromPoint(e.clientX, e.clientY);
            if (cell) cell = cell.closest('#yp-months .yp-cell');
            if (cell) applyMarkerToCell(cell);
        });

        document.addEventListener('mouseup', function() {
            if (markerDragging) {
                markerDragging = false;
                markerLastCell = null;
                body.classList.remove('marker-dragging');
            }
        });

        // Also handle single clicks in marker mode (capture phase)
        document.addEventListener('click', function(e) {
            if (!markerActive) return;
            var cell = e.target.closest('#yp-months .yp-cell');
            if (cell) {
                e.preventDefault();
                e.stopPropagation();
                // Already applied on mousedown, but catch any edge cases
            }
        }, true);

        // Close marker flyout when clicking outside (but not while actively marking)
        document.addEventListener('click', function(e) {
            if (markerActive) return;
            if (markerFlyout && markerFlyout.classList.contains('open') &&
                !markerFlyout.contains(e.target) &&
                e.target !== railMarkerBtn &&
                !railMarkerBtn.contains(e.target)) {
                closeMarkerFlyout();
            }
        });

        // Deactivate marker mode when rail closes
        var origRailToggleHandler = railToggle ? railToggle.onclick : null;

        // ---- Emoji stamp mode ----
        var railEmojiBtn  = document.getElementById('railEmojiBtn');
        var emojiFlyout   = document.getElementById('railEmojiFlyout');
        var emojiActive   = false;
        var emojiSelected = '';
        var emojiDragging = false;
        var emojiLastCell = null;

        function openEmojiFlyout() {
            closeFlyout();  // close calendar flyout if open
            if (emojiFlyout) emojiFlyout.classList.add('open');
            if (railEmojiBtn) railEmojiBtn.classList.add('flyout-active');
        }
        function closeEmojiFlyout() {
            if (emojiFlyout) emojiFlyout.classList.remove('open');
            if (railEmojiBtn) railEmojiBtn.classList.remove('flyout-active');
        }
        function activateEmojiMode() {
            if (markerActive) deactivateMarkerMode();
            emojiActive = true;
            body.classList.add('emoji-mode');
            if (railEmojiBtn) railEmojiBtn.classList.add('active');
            openEmojiFlyout();
        }
        function deactivateEmojiMode() {
            emojiActive = false;
            body.classList.remove('emoji-mode');
            body.classList.remove('emoji-dragging');
            if (railEmojiBtn) railEmojiBtn.classList.remove('active');
            closeEmojiFlyout();
            emojiDragging = false;
            emojiLastCell = null;
        }

        if (railEmojiBtn) {
            railEmojiBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (emojiActive) {
                    deactivateEmojiMode();
                } else {
                    activateEmojiMode();
                }
            });
        }

        // Tab switching
        if (emojiFlyout) {
            emojiFlyout.querySelectorAll('.emoji-tab-btn').forEach(function(tabBtn) {
                tabBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var tab = tabBtn.getAttribute('data-tab');
                    emojiFlyout.querySelectorAll('.emoji-tab-btn').forEach(function(b) { b.classList.remove('active'); });
                    emojiFlyout.querySelectorAll('.emoji-tab-panel').forEach(function(p) { p.classList.remove('active'); });
                    tabBtn.classList.add('active');
                    var panel = emojiFlyout.querySelector('[data-panel="' + tab + '"]');
                    if (panel) panel.classList.add('active');
                });
            });

            // Emoji selection
            emojiFlyout.querySelectorAll('.emoji-stamp-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    emojiSelected = btn.getAttribute('data-emoji');
                    emojiFlyout.querySelectorAll('.emoji-stamp-btn').forEach(function(b) { b.classList.remove('selected'); });
                    btn.classList.add('selected');
                });
            });
        }

        // Apply emoji to a single grid cell via the Vue app
        function applyEmojiToCell(cellEl) {
            if (cellEl === emojiLastCell) return;
            emojiLastCell = cellEl;

            var appEl = document.getElementById('app');
            if (!appEl || !appEl._vnode || !appEl._vnode.component) return;
            var vueInstance = appEl._vnode.component.proxy;
            if (!vueInstance) return;

            var monthCol = cellEl.closest('[class*="col"]');
            if (!monthCol) return;
            var monthsRow = monthCol.parentElement;
            if (!monthsRow) return;
            var cols = monthsRow.querySelectorAll(':scope > [class*="col"]');
            var mindex = -1;
            for (var ci = 0; ci < cols.length; ci++) {
                if (cols[ci] === monthCol) { mindex = ci; break; }
            }
            if (mindex < 0) return;

            var daySpan = cellEl.querySelector('.yp-cell-text');
            if (!daySpan) return;
            var dayText = daySpan.textContent.trim().replace(/\u00a0/g, '');
            var day = parseInt(dayText);
            if (isNaN(day) || day < 1) return;

            var entry      = vueInstance.getEntry(mindex, day);
            var entryType  = vueInstance.getEntryType(mindex, day);
            var colour     = vueInstance.getEntryColour(mindex, day);
            var notes      = vueInstance.getEntryNotes(mindex, day);
            vueInstance.updateEntry(mindex, day, entry, entryType, colour, notes, emojiSelected, true);
        }

        // Intercept grid cell interactions in emoji mode
        document.addEventListener('mousedown', function(e) {
            if (!emojiActive) return;
            var cell = e.target.closest('#yp-months .yp-cell');
            if (!cell) return;
            e.preventDefault();
            e.stopPropagation();
            emojiDragging = true;
            emojiLastCell = null;
            body.classList.add('emoji-dragging');
            applyEmojiToCell(cell);
        }, true);

        document.addEventListener('mousemove', function(e) {
            if (!emojiDragging) return;
            var cell = document.elementFromPoint(e.clientX, e.clientY);
            if (cell) cell = cell.closest('#yp-months .yp-cell');
            if (cell) applyEmojiToCell(cell);
        });

        document.addEventListener('mouseup', function() {
            if (emojiDragging) {
                emojiDragging = false;
                emojiLastCell = null;
                body.classList.remove('emoji-dragging');
            }
        });

        // Also handle single clicks in emoji mode (capture phase)
        document.addEventListener('click', function(e) {
            if (!emojiActive) return;
            var cell = e.target.closest('#yp-months .yp-cell');
            if (cell) {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true);

        // Close emoji flyout when clicking outside (but not while actively stamping)
        document.addEventListener('click', function(e) {
            if (emojiActive) return;
            if (emojiFlyout && emojiFlyout.classList.contains('open') &&
                !emojiFlyout.contains(e.target) &&
                e.target !== railEmojiBtn &&
                !railEmojiBtn.contains(e.target)) {
                closeEmojiFlyout();
            }
        });

        // ---- Rail → app bridge buttons ----
        var railShareBtn = document.getElementById('railShareBtn');
        if (railShareBtn) {
            railShareBtn.addEventListener('click', function() {
                var brand = document.querySelector('.navbar-brand[data-toggle="tooltip"]');
                if (brand) brand.click();
            });
        }

        var railMenuBtn = document.getElementById('railMenuBtn');
        if (railMenuBtn) {
            railMenuBtn.addEventListener('click', function() {
                var container = document.querySelector('.nav-settings');
                if (container) {
                    var btn = container.closest('.btn-group').querySelector('button');
                    if (btn) btn.click();
                }
            });
        }

        var railSigninBtn = document.getElementById('railSigninBtn');
        if (railSigninBtn) {
            railSigninBtn.addEventListener('click', function() {
                $('#authModal').modal('show');
            });
        }

        var authModalEl = document.getElementById('authModal');
        if (authModalEl) {
            authModalEl.addEventListener('show.bs.modal', function() {
                var appEl = document.getElementById('app');
                if (appEl && appEl.__vue_app__ && appEl.__vue_app__._instance) {
                    var proxy = appEl.__vue_app__._instance.proxy;
                    if (proxy && proxy.signInWith) {
                        proxy.signInWith('google');
                    }
                }
            });
        }
    })();
    </script>
