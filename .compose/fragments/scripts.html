    <!-- Early theme apply (before Vue mounts) — prevents flash -->
    <script>
    (function(){
        var saved = localStorage.getItem('style_theme') || 'ink';
        document.body.setAttribute('data-theme', saved);
        if (new URLSearchParams(window.location.search).get('theme') === 'dark') {
            document.body.classList.add('yp-dark');
        }
        if (sessionStorage.getItem('rail_open') === '1') {
            var r = document.getElementById('rail');
            if (r) r.classList.add('open');
            document.body.classList.add('rail-open');
            sessionStorage.removeItem('rail_open');
        }
    })();
    </script>
    <script type="module" src="./js/main.js"></script>
