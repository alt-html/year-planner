    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>

    <script  type="module" src="./js/main.js"></script>

    <!-- Rail toggle, style-theme switching, dark-mode early-apply, calendar flyout -->
    <script>
    (function() {
        var body = document.body;
        var rail = document.getElementById('rail');
        var railToggle = document.getElementById('railToggle');
        var darkToggle = document.getElementById('darkToggle');
        var railDarkToggle = document.getElementById('railDarkToggle');
        var themeLabel = document.getElementById('themeLabel');
        var iconRuler = document.getElementById('themeSwitchIconRuler');
        var iconFeather = document.getElementById('themeSwitchIconFeather');
        var calendarFlyout = document.getElementById('railCalendarFlyout');
        var railCalendarBtn = document.getElementById('railCalendarBtn');
        var railYearInput = document.getElementById('railYearInput');

        // ---- Style theme (ink / nordic) on <body> ----
        var savedStyleTheme = localStorage.getItem('style_theme') || 'ink';
        body.setAttribute('data-theme', savedStyleTheme);
        applyThemeLabel(savedStyleTheme);

        function applyThemeLabel(theme) {
            var isNordic = theme === 'nordic';
            var label = isNordic ? 'Crisp &amp; Clear' : 'Ink &amp; Paper';
            if (themeLabel) themeLabel.innerHTML = label;
            var navLabel = document.getElementById('navThemeLabel');
            if (navLabel) navLabel.innerHTML = label;
            if (iconRuler)  iconRuler.style.display  = isNordic ? 'none'   : 'inline';
            if (iconFeather) iconFeather.style.display = isNordic ? 'inline' : 'none';
        }

        // ---- Dark mode early-apply from URL ----
        var params = new URLSearchParams(window.location.search);
        if (params.get('theme') === 'dark') {
            body.classList.add('yp-dark');
        }

        // ---- Restore rail state from sessionStorage ----
        if (sessionStorage.getItem('rail_open') === '1') {
            rail.classList.add('open');
            body.classList.add('rail-open');
            sessionStorage.removeItem('rail_open');
        }

        // ---- Rail toggle ----
        if (railToggle) {
            railToggle.addEventListener('click', function() {
                closeFlyout();
                rail.classList.toggle('open');
                body.classList.toggle('rail-open');
            });
        }

        // Close rail when clicking outside (but NOT for dark/theme toggles in the rail)
        document.addEventListener('click', function(e) {
            // Close flyout if clicking outside it and outside the calendar button
            if (calendarFlyout && calendarFlyout.classList.contains('open') &&
                !calendarFlyout.contains(e.target) &&
                e.target !== railCalendarBtn &&
                !railCalendarBtn.contains(e.target)) {
                closeFlyout();
            }

            if (rail && rail.classList.contains('open') &&
                !rail.contains(e.target) &&
                e.target !== railToggle &&
                !railToggle.contains(e.target) &&
                !(calendarFlyout && calendarFlyout.contains(e.target))) {
                rail.classList.remove('open');
                body.classList.remove('rail-open');
                closeFlyout();
            }
        });

        // ---- Dark mode toggle ----
        function doDarkToggle() {
            // Persist rail state across reload
            if (rail && rail.classList.contains('open')) {
                sessionStorage.setItem('rail_open', '1');
            }
            var p = new URLSearchParams(window.location.search);
            var current = p.get('theme') || 'light';
            var next = current === 'dark' ? 'light' : 'dark';
            p.set('theme', next);
            window.location.search = p.toString();
        }
        if (darkToggle)     darkToggle.addEventListener('click', doDarkToggle);
        if (railDarkToggle) railDarkToggle.addEventListener('click', doDarkToggle);

        // ---- Style-theme toggle ----
        var themeToggleBtn = document.getElementById('themeToggleBtn');
        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', function() {
                var current = body.getAttribute('data-theme');
                var next = current === 'ink' ? 'nordic' : 'ink';
                body.setAttribute('data-theme', next);
                localStorage.setItem('style_theme', next);
                applyThemeLabel(next);
            });
        }

        // ---- Calendar flyout ----
        function closeFlyout() {
            if (calendarFlyout) calendarFlyout.classList.remove('open');
            if (railCalendarBtn) railCalendarBtn.classList.remove('flyout-active');
        }

        if (railCalendarBtn) {
            railCalendarBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isOpen = calendarFlyout.classList.contains('open');
                if (isOpen) {
                    closeFlyout();
                } else {
                    calendarFlyout.classList.add('open');
                    railCalendarBtn.classList.add('flyout-active');
                }
            });
        }

        // Close flyout when a month/today link is clicked (it scrolls to that anchor)
        if (calendarFlyout) {
            calendarFlyout.querySelectorAll('a.rail-flyout-item').forEach(function(link) {
                link.addEventListener('click', function() {
                    closeFlyout();
                    rail.classList.remove('open');
                    body.classList.remove('rail-open');
                });
            });
        }

        // Year input in flyout — navigate on Enter
        if (railYearInput) {
            railYearInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    var yr = parseInt(railYearInput.value);
                    if (!isNaN(yr) && yr > 0 && yr < 10000) {
                        var p = new URLSearchParams(window.location.search);
                        p.set('year', yr);
                        window.location.search = p.toString();
                    }
                }
            });
        }

        // ---- Rail → app bridge buttons ----
        var railShareBtn = document.getElementById('railShareBtn');
        if (railShareBtn) {
            railShareBtn.addEventListener('click', function() {
                var brand = document.querySelector('.navbar-brand[data-toggle="tooltip"]');
                if (brand) brand.click();
            });
        }

        var railMenuBtn = document.getElementById('railMenuBtn');
        if (railMenuBtn) {
            railMenuBtn.addEventListener('click', function() {
                var container = document.querySelector('.nav-settings');
                if (container) {
                    var btn = container.closest('.btn-group').querySelector('button');
                    if (btn) btn.click();
                }
            });
        }
    })();
    </script>
